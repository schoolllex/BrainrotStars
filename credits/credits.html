<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">

            </div>

                    </article>
                    <article class="credit-row">
                        <h2>Idée originale: Brainrot Gamble</h2>
                        <a href="https://brainrotgamble-creator.github.io/GameBrairotGamble/" target="_blank" rel="noopener noreferrer">https://brainrotgamble-creator.github.io/GameBrairotGamble/</a>
                    </article>
                </div>
            </section>
        </main>
    </div>

    <div id="global-loader" class="global-loader hidden" aria-hidden="true">
        <div class="global-loader-spinner"></div>
